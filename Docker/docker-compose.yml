services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: memos-backend
    ports:
      - "8081:8081"
    volumes:
      - memos_data:/var/opt/memos
    environment:
      MEMOS_MODE: "prod"
      MEMOS_PORT: "8081"
      MEMOS_DATA: "/var/opt/memos"
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    restart: unless-stopped

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile.frontend
    container_name: memos-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    restart: unless-stopped

volumes:
  memos_data: