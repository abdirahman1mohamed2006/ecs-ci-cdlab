name: Build and Push to ECR

on:
  workflow_dispatch:
    inputs:
      docker_push:
        description: "Type yes to push the image"
        required: true
        type: string

  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'app/**'
      - '.github/workflows/docker.yaml'

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: ecsagain

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'push' || github.event.inputs.docker_push == 'yes' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --no-cache -t ${{ env.ECR_REPOSITORY }}:${{ github.sha }} -f Dockerfile .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
           submodules: recursive
           token: ${{ secrets.GITHUB_TOKEN }}         
           aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
           aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
           aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag ${{ env.ECR_REPOSITORY }}:${{ github.sha }} $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

          docker tag ${{ env.ECR_REPOSITORY }}:${{ github.sha }} $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest